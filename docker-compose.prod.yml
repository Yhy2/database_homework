services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_secondhand}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./sql/03_views.sql:/docker-entrypoint-initdb.d/03_views.sql:ro

  backend:
    build:
      context: .
      args:
        VITE_DEMO_ACCESS_TOKEN: ${DEMO_ACCESS_TOKEN:?set DEMO_ACCESS_TOKEN}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_DEBUG: 0
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_secondhand}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      DEMO_ACCESS_TOKEN: ${DEMO_ACCESS_TOKEN:?set DEMO_ACCESS_TOKEN}
    ports:
      - "${APP_PORT:-80}:5000"

volumes:
  mysql_data:
